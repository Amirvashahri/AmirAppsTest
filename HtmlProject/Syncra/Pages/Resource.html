<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncra</title>
    <link rel="stylesheet" href="/Styles/header.css">
    <link rel="stylesheet" href="/Styles/footer.css">
    <link rel="stylesheet" href="/Styles/Resource.css">
</head>
<body>
    <div id="header"></div>
    <script src="/Js/loadComponents.js"></script>
    <section class="craft-section">

    <div class="craft-header">

        <div class="craft-title">

            <div class="craft-badge">

                <img src="/Logos/Main Page/BadgeIcon.svg" alt="">

                <span>Your Text</span>

                <span>%</span>

            </div>

            <h2>

                Crafting Structural

                <span>Elegance.</span>

            </h2>

        </div>

        <div class="craft-description">

            <p>
                We built Synkra because we couldn't find the tool we
                actually needed. We believe ops shouldn't be a
                bottleneck—it should be a brain.
            </p>

        </div>

    </div>

    <div class="craft-image">

        <img src="/Pictures/Overlay+Shadow.svg" alt="">

        <div class="craft-card">

            <span>Headquarters</span>

            <h4>San Francisco, CA</h4>

        </div>

    </div>

</section>
</body>
</html>
